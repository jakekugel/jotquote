# jotquote configuration file
# Properties are organized into three sections: general, lint, and web

[general]
# Path to the quote file (relative paths are resolved relative to this config directory)
quote_file = ./quotes.txt

# Line separator to use when writing quotes: 'platform' (default), 'unix', or 'windows'
line_separator = platform

# Title displayed in the web interface
web_page_title = My Quotes

# Optional path to quotemap file for date-to-quote mappings
quotemap_file =

[lint]
# Whether to run linting on quotes when they are added via 'jotquote add'
lint_on_add = false

# Regex pattern for detecting author anti-patterns (e.g., "Unknown" or "Anonymous")
lint_author_antipattern_regex =

# Enabled lint checks (comma-separated). Valid values: ascii, smart-quotes, smart-dashes, double-spaces, quote-too-long, no-tags, no-author, author-antipatterns, required-tag-group
lint_enabled_checks = ascii, author-antipatterns, double-spaces, no-author, no-tags, quote-too-long, required-tag-group, smart-dashes, smart-quotes

# Maximum quote length (0 = no limit)
lint_max_quote_length = 0

[web]
# Port for the web server
web_port = 5544

# IP address for the web server to listen on
web_ip = 127.0.0.1

# Cache lifetime in minutes for web server responses
web_cache_minutes = 240

# Whether to show star ratings in the web interface
web_show_stars = false

# Light theme colors (when user selects light mode)
web_light_foreground_color = #000000
web_light_background_color = #ffffff

# Dark theme colors (when user selects dark mode)
web_dark_foreground_color = #ffffff
web_dark_background_color = #000000
