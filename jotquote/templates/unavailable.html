<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page_title }}</title>

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<script>
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('jotquote-theme') || 'dark'
  );
</script>
<style>

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Regular.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 700;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Bold.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: italic;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Italic.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 100 900;
    src: url("{{ url_for('static', filename='fonts/Inter-VariableFont_opsz,wght.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Inter';
    font-style: italic;
    font-weight: 100 900;
    src: url("{{ url_for('static', filename='fonts/Inter-Italic-VariableFont_opsz,wght.ttf') }}") format('truetype');
}

[data-theme="dark"] {
    --fg:           {{ dark_fg }};
    --bg:           {{ dark_bg }};
    --cmd-bg:       #505050;
    --cmd-fg:       #e8e8e8;
    --btn-bg:       #444444;
    --muted-fg:     #999999;
}

[data-theme="light"] {
    --fg:           {{ light_fg }};
    --bg:           {{ light_bg }};
    --cmd-bg:       #e4e4e4;
    --cmd-fg:       #111111;
    --btn-bg:       #dddddd;
    --muted-fg:     #555555;
}

body {
    background-color: var(--bg);
    color: var(--fg);
}

.container {
    margin-left: auto;
    margin-right: auto;
    margin-top: 3em;
    width: 40em;
}

.quote {
    font-family: "Inter", sans-serif;
    font-size: 175%;
}

.author {
    font-family: "Open Sans", Palatino, serif;
    font-size: 175%;
    font-variant: small-caps;
    font-weight: bold;
    text-align: right;
}

.publication {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    text-align: right;
    font-style: italic;
}

.footer {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    font-style: italic;
}

.command {
    font-family: Consolas, Monaco, 'Lucida Console', 'Liberation Mono', 'DejaVu Sans Mono', 'Bitstream Vera Sans Mono', 'Courier New', monospace;
    font-size: 100%;
    border: 2px;
    color: var(--cmd-fg);
    border-style: solid;
    background-color: var(--cmd-bg);
    border-radius: 8px;
    padding: 5px;
    margin-top: 5px;
}

.quotenum {
    float: right;
}

.button {
    background-color: var(--btn-bg);
    border: 1px;
    border-style: solid;
    border-radius: 4px;
    color: var(--fg);
    font-family: "Open Sans", Palatino, serif;
    font-size: 75%;
    font-weight: bold;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    margin: 2px 2px;
    padding: 2px 6px;
    cursor: pointer;
}
</style>
    <script>
        function setDisplay (target, str) {
            document.getElementById(target).style.display = str;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="quote">The quotes are not yet available; please try again later.</div>
        <div>
            <span class="footer">
            </span>
            <span class="footer quotenum">{{ date1 }}</span>
        </div>
        {% if hash is not none %}
            <div id='settag' class="command" style="display:none;">$ jotquote settags -s {{hash}} {{comma_tags}}</div>
        {% endif %}
    </div>
</body>
</html>
