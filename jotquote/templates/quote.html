<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page_title }}</title>

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<script>
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('jotquote-theme') || 'dark'
  );
</script>
<style>

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Regular.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 700;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Bold.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: italic;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Italic.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 100 900;
    src: url("{{ url_for('static', filename='fonts/Inter-VariableFont_opsz,wght.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Inter';
    font-style: italic;
    font-weight: 100 900;
    src: url("{{ url_for('static', filename='fonts/Inter-Italic-VariableFont_opsz,wght.ttf') }}") format('truetype');
}

[data-theme="dark"] {
    --fg:           {{ dark_fg }};
    --bg:           {{ dark_bg }};
    --horiz-line:   #555555;
    --cmd-bg:       #505050;
    --cmd-fg:       #e8e8e8;
    --muted-fg:     #999999;
}

[data-theme="light"] {
    --fg:           {{ light_fg }};
    --bg:           {{ light_bg }};
    --horiz-line:   #aaaaaa;
    --cmd-bg:       #e4e4e4;
    --cmd-fg:       #111111;
    --muted-fg:     #555555;
}

body {
    background-color: var(--bg);
    color: var(--fg);
}

/* Centering CSS from here: https://stackoverflow.com/a/36717369 */
.container {
    width: 40em;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.quote {
    font-family: "Inter", sans-serif;
    font-size: 175%;

}

.author {
    font-family: "Inter", sans-serif;
    font-size: 175%;
    font-variant: small-caps;
    font-weight: bold;
    text-align: right;
}

.publication {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    text-align: right;
    font-style: italic;
}

.stars {
    font-size: 120%;
    color: var(--fg);

}

.date {
    font-family: "Open Sans", Palatino, serif;
    font-size: 120%;
    font-style: italic;
}

.horiz-line {
    height: 2px;
    background: var(--horiz-line);
    margin-left: auto;
    margin-right: auto;
}

.icon-btn {
    display: flex;
    align-items: center;
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 102%;
    padding: 0;
    border-radius: 4px;
}

.icon-btn:hover { opacity: 0.7; }

.icon-btn-outline {
    background: transparent;
    border: 1.5px solid var(--fg);
    color: var(--fg);
}

.footer-row {
    display: flex;
    flex: 1;
    justify-content: space-between;
    align-items: center;
}

.btn-group {
    display: flex;
    align-items: center;
}

.theme-icon, .copy-link-icon {
    display: inline-block;
    width: 1.25em;
    height: 1.25em;
    vertical-align: middle;
    background-color: var(--fg);
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;
}

.theme-icon {
    mask-image: url("{{ url_for('static', filename='icons/night-mode.svg') }}");
}

.copy-link-icon {
    mask-image: url("{{ url_for('static', filename='icons/copy-link.svg') }}");
}

/* Modify CSS for small screens */
@media screen and (max-width: 700px) {
    .container {
        width: 80%;
    }

    .quote {
        font-size: 150%;
    }

    .author {
        font-size: 150%;
    }

    .date {
        font-size: 75%;
    }

    .publication {
        font-size: 75%;
    }
}


</style>
</head>
<body>
    <div class="container">
        <div class="horiz-line"></div>
        <div class="quote">{{ quote }}</div>
        <div class="author">{{ author }}</div>
        {% if publication is not none %}
   	        <div class="publication">{{ publication }}</div>
   	    {% endif %}
        <div class="horiz-line"></div>
        <div class="footer-row">
            <div class="btn-group">
              {% if permalink %}
                <button class="icon-btn" id="permalink-btn" onclick="copyPermalink('{{ permalink }}')"
                        title="Copy permalink" aria-label="Copy permalink"><span class="copy-link-icon"></span></button>
              {% endif %}
              <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()"
                      title="Toggle light/dark mode" aria-label="Toggle light/dark mode" style="margin-left: 1.25em;"><span class="theme-icon"></span></button>
            </div>
            <div class="stars">{% if show_stars and stars > 0 %}{{ '★' * stars }}{{ '☆' * (5 - stars) }}{% endif %}</div>
            <div class="date">{{ date1 }}</div>
        </div>
    </div>
    <script>
        function toggleTheme() {
            var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('jotquote-theme', next);
        }

        function copyPermalink(path) {
            navigator.clipboard.writeText(window.location.origin + path);
            var btn = document.getElementById('permalink-btn');
            btn.classList.add('icon-btn-outline');
            setTimeout(function() {
                btn.classList.remove('icon-btn-outline');
            }, 2000);
        }
    </script>
</body>
</html>
