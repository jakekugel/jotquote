<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page_title }}</title>

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<script>
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('jotquote-theme') || 'dark'
  );
</script>
<style>

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Regular.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 700;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Bold.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: italic;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Italic.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 100 900;
    src: url("{{ url_for('static', filename='fonts/Inter-VariableFont_opsz,wght.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Inter';
    font-style: italic;
    font-weight: 100 900;
    src: url("{{ url_for('static', filename='fonts/Inter-Italic-VariableFont_opsz,wght.ttf') }}") format('truetype');
}

[data-theme="dark"] {
    --fg:           {{ dark_fg }};
    --bg:           {{ dark_bg }};
    --horiz-line:   #555555;
    --cmd-bg:       #505050;
    --cmd-fg:       #e8e8e8;
    --muted-fg:     #999999;
}

[data-theme="light"] {
    --fg:           {{ light_fg }};
    --bg:           {{ light_bg }};
    --horiz-line:   #aaaaaa;
    --cmd-bg:       #e4e4e4;
    --cmd-fg:       #111111;
    --muted-fg:     #555555;
}

body {
    background-color: var(--bg);
    color: var(--fg);
}

/* Centering CSS from here: https://stackoverflow.com/a/36717369 */
.container {
    width: 40em;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.quote {
    font-family: "Inter", sans-serif;
    font-size: 175%;

}

.author {
    font-family: "Inter", sans-serif;
    font-size: 175%;
    font-variant: small-caps;
    font-weight: bold;
    text-align: right;
}

.publication {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    text-align: right;
    font-style: italic;
}

.stars {
    font-size: 131%;
    color: var(--fg);
    margin-top: -6px;
}

.date {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    font-style: italic;
}

.horiz-line {
    height: 2px;
    background: var(--horiz-line);
    margin-left: auto;
    margin-right: auto;
}

.icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted-fg);
    font-size: 100%;
    padding: 0;
    line-height: 1;
}

.icon-btn:hover { opacity: 0.7; }

/* Modify CSS for small screens */
@media screen and (max-width: 700px) {
    .container {
        width: 80%;
    }

    .quote {
        font-size: 150%;
    }

    .author {
        font-size: 150%;
    }

    .date {
        font-size: 75%;
    }

    .publication {
        font-size: 75%;
    }
}


</style>
</head>
<body>
    <div class="container">
        <div class="horiz-line"></div>
        <div class="quote">{{ quote }}</div>
        <div class="author">{{ author }}</div>
        {% if publication is not none %}
   	        <div class="publication">{{ publication }}</div>
   	    {% endif %}
        <div class="horiz-line"></div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="stars">{% if show_stars and stars > 0 %}{{ '★' * stars }}{{ '☆' * (5 - stars) }}{% endif %}</span>
            <span>
              {% if permalink %}
                <button class="icon-btn" id="permalink-btn" onclick="copyPermalink('{{ permalink }}')"
                        title="Copy permalink" aria-label="Copy permalink">&#x1F517;</button>
              {% endif %}
              <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()"
                      title="Toggle light/dark mode" aria-label="Toggle light/dark mode"></button>
            </span>
            <span class="date">{{ date1 }}</span>
        </div>
    </div>
    <script>
        function toggleTheme() {
            var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('jotquote-theme', next);
            // \u2600 = ☀ (sun, light mode icon); \uD83C\uDF19 = 🌙 (crescent moon, dark mode icon)
            document.getElementById('theme-toggle').textContent = next === 'dark' ? '\u2600' : '\uD83C\uDF19';
        }

        function copyPermalink(path) {
            navigator.clipboard.writeText(window.location.origin + path);
        }

        document.addEventListener('DOMContentLoaded', function() {
            var theme = document.documentElement.getAttribute('data-theme') || 'dark';
            // \u2600 = ☀ (sun, light mode icon); \uD83C\uDF19 = 🌙 (crescent moon, dark mode icon)
            document.getElementById('theme-toggle').textContent = theme === 'dark' ? '\u2600' : '\uD83C\uDF19';
        });
    </script>
</body>
</html>
