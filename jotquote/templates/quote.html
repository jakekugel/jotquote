<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page_title }}</title>

<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
<style>

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Regular.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: normal;
    font-weight: 700;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Bold.ttf') }}") format('truetype');
}

@font-face {
    font-family: 'Open Sans';
    font-style: italic;
    font-weight: 400;
    src: url("{{ url_for('static', filename='fonts/OpenSans-Italic.ttf') }}") format('truetype');
}

/* Centering CSS from here: https://stackoverflow.com/a/36717369 */
.container {
    width: 40em;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    -webkit-transform: translate(-50%, -50%);
    -moz-transform: translate(-50%, -50%);
    -o-transform: translate(-50%, -50%);
    -ms-transform: translate(-50%, -50%);

}

.quote {
    font-family: "Open Sans", Palatino, serif;
    font-size: 175%;

}

.author {
    font-family: "Open Sans", Palatino, serif;
    font-size: 175%;
    font-variant: small-caps;
    font-weight: bold;
    text-align: right;
}

.publication {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    text-align: right;
    font-style: italic;
}

.stars {
    font-size: 131%;
    color: black;
    margin-top: -6px;
}

.date {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    font-style: italic;
}

.command {
    font-family:Consolas,Monaco,Lucida Console,Liberation Mono,DejaVu Sans Mono,Bitstream Vera Sans Mono,Courier New,monospace;
    font-size: 100%;
    border: 2px;
    color: white;
    border-style: solid;
    background-color: #505050;
    border-radius: 8px;
    padding: 5px;
    margin-top: 5px;
}

.horiz-line {
    height:2px;
    background:black;
    margin-left: auto;
    margin-right: auto;
}

.permalink {
    font-family: "Open Sans", Palatino, serif;
    font-size: 75%;
}

.permalink a {
    color: #999999;
    text-decoration: none;
}

.permalink a:hover {
    text-decoration: underline;
}

/* Modify CSS for small screens */
@media screen and (max-width: 700px) {
    .container {
        width: 80%;
    }

    .quote {
        font-size: 150%;
    }

    .author {
        font-size: 150%;
    }

    .date {
        font-size: 75%;
    }

    .publication {
        font-size: 75%;
    }
}


</style>
</head>
<body style="background-color:white;">
    <div class="container">
        <div class="horiz-line"></div>
        <div class="quote">{{ quote }}</div>
        <div class="author">{{ author }}</div>
        {% if publication is not none %}
   	        <div class="publication">{{ publication }}</div>
   	    {% endif %}
        <div class="horiz-line"></div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="stars">{% if show_stars and stars > 0 %}{{ '★' * stars }}{{ '☆' * (5 - stars) }}{% endif %}</span>
            <span>
              {% if permalink %}
                <span class="permalink"><a href="{{ permalink }}">permalink</a></span>
              {% endif %}
            </span>
            <span class="date">{{ date1 }}</span>
        </div>
    </div>
</body>
</html>
