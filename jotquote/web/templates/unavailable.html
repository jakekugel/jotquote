<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page_title }}</title>

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<script>
  document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('jotquote-theme') || 'dark'
  );
</script>
<style>

{% include '_font_faces.html' %}

[data-theme="dark"] {
    --fg:           {{ dark_fg }};
    --bg:           {{ dark_bg }};
    --btn-bg:       #444444;
    --muted-fg:     #999999;
}

[data-theme="light"] {
    --fg:           {{ light_fg }};
    --bg:           {{ light_bg }};
    --btn-bg:       #dddddd;
    --muted-fg:     #555555;
}

body {
    background-color: var(--bg);
    color: var(--fg);
}

.container {
    margin-left: auto;
    margin-right: auto;
    margin-top: 3em;
    width: 40em;
}

.quote {
    font-family: "Inter", sans-serif;
    font-size: 175%;
}

.author {
    font-family: "Open Sans", Palatino, serif;
    font-size: 175%;
    font-variant: small-caps;
    font-weight: bold;
    text-align: right;
}

.publication {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    text-align: right;
    font-style: italic;
}

.footer {
    font-family: "Open Sans", Palatino, serif;
    font-size: 100%;
    font-style: italic;
}

.quotenum {
    float: right;
}

.button {
    background-color: var(--btn-bg);
    border: 1px;
    border-style: solid;
    border-radius: 4px;
    color: var(--fg);
    font-family: "Open Sans", Palatino, serif;
    font-size: 75%;
    font-weight: bold;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    margin: 2px 2px;
    padding: 2px 6px;
    cursor: pointer;
}
</style>
</head>
<body>
    <div class="container">
        <div class="quote">The quotes are not yet available; please try again later.</div>
        <div>
            <span class="footer">
            </span>
            <span class="footer quotenum">{{ date1 }}</span>
        </div>
    </div>
</body>
</html>
