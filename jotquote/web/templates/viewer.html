<!DOCTYPE html>
<html lang="en">
<head>
{% include '_head_common.html' %}
<script>
  document.documentElement.setAttribute(
    'data-font', localStorage.getItem('jotquote-font') || 'inter');
</script>
<noscript>
<style>
    :root {
        --fg:           {{ dark_fg }};
        --bg:           {{ dark_bg }};
        --horiz-line:   #555555;
        --cmd-bg:       #505050;
        --cmd-fg:       #e8e8e8;
        --muted-fg:     #999999;
    }
</style>
</noscript>
<style>

::view-transition-old(root),
::view-transition-new(root) {
    animation-duration: 2s;
    animation-timing-function: ease-in-out;
}

{% include '_font_faces.html' %}

:root { --quote-font: "Inter"; }
[data-font="libre-baskerville"] { --quote-font: "Libre Baskerville"; }

[data-theme="dark"] {
    --fg:           {{ dark_fg }};
    --bg:           {{ dark_bg }};
    --horiz-line:   #555555;
    --cmd-bg:       #505050;
    --cmd-fg:       #e8e8e8;
    --muted-fg:     #999999;
}

[data-theme="light"] {
    --fg:           {{ light_fg }};
    --bg:           {{ light_bg }};
    --horiz-line:   #aaaaaa;
    --cmd-bg:       #e4e4e4;
    --cmd-fg:       #111111;
    --muted-fg:     #555555;
}

body {
    background-color: var(--bg);
    color: var(--fg);
}

/* Centering CSS from here: https://stackoverflow.com/a/36717369 */
.container {
    width: 40em;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.quote {
    font-family: var(--quote-font), sans-serif;
    font-size: 175%;

}

.author {
    font-family: var(--quote-font), sans-serif;
    font-size: 175%;
    font-variant: small-caps;
    font-weight: normal;
    text-align: right;
}

.publication {
    font-family: var(--quote-font), sans-serif;
    font-size: 100%;
    text-align: right;
    font-style: italic;
}

.stars {
    font-size: 120%;
    color: var(--fg);

}

.date {
    font-family: "Open Sans", Palatino, serif;
    font-size: 120%;
    font-style: italic;
}

.horiz-line {
    height: 2px;
    background: var(--horiz-line);
    margin-left: auto;
    margin-right: auto;
}

.icon-btn {
    display: flex;
    align-items: center;
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 102%;
    padding: 0;
    border-radius: 4px;
}

.icon-btn:hover { opacity: 0.7; }

.icon-btn-outline {
    background: transparent;
    border: 1.5px solid var(--fg);
    color: var(--fg);
}

.footer-row {
    display: flex;
    flex: 1;
    justify-content: space-between;
    align-items: center;
}

.btn-group {
    display: flex;
    align-items: center;
}

#expandable-btns {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
    max-width: 0;
    transition: max-width 0.8s;
}

#expandable-btns.expanded {
    transition: max-width 0.8s;
}

.theme-icon, .copy-link-icon, .about-icon, .fullscreen-icon, .expand-icon, .collapse-icon, .change-font-icon {
    display: inline-block;
    width: 1.25em;
    height: 1.25em;
    vertical-align: middle;
    background-color: var(--fg);
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;
}

.theme-icon {
    mask-image: url("{{ url_for('static', filename='icons/dark-mode.svg') }}");
}

.copy-link-icon {
    mask-image: url("{{ url_for('static', filename='icons/copy-link.svg') }}");
}

.about-icon {
    mask-image: url("{{ url_for('static', filename='icons/about.svg') }}");
}

.fullscreen-icon {
    mask-image: url("{{ url_for('static', filename='icons/full-screen-circle.svg') }}");
}

.expand-icon {
    mask-image: url("{{ url_for('static', filename='icons/circled-right-chevron.svg') }}");
}

.collapse-icon {
    mask-image: url("{{ url_for('static', filename='icons/circled-left-chevron.svg') }}");
}

.change-font-icon {
    mask-image: url("{{ url_for('static', filename='icons/change-font.svg') }}");
}

/* Modify CSS for small screens */
@media screen and (max-width: 700px) {
    .container {
        width: 80%;
    }

    .quote {
        font-size: 150%;
    }

    .author {
        font-size: 150%;
    }

    .date {
        font-size: 75%;
    }

    .publication {
        font-size: 75%;
    }
}


</style>
</head>
<body>
    <div class="container">
        <div class="horiz-line"></div>
        <div class="quote">{{ quote }}</div>
        <div class="author">{{ author }}</div>
        <div id="publication" class="publication"{% if not publication %} hidden{% endif %}>{{ publication or '' }}</div>
        <div class="horiz-line"></div>
        <div class="footer-row">
            <div class="btn-group">
              <span id="expandable-btns">
                {% if permalink %}
                  <button class="icon-btn" id="permalink-btn" data-permalink="{{ permalink }}"
                          onclick="copyPermalink(this.dataset.permalink)"
                          title="Copy permalink" aria-label="Copy permalink" style="margin-right: 1.25em;"><span class="copy-link-icon"></span></button>
                {% endif %}
                {% if show_about %}
                  <a class="icon-btn" href="/about" title="About" aria-label="About"
                     style="margin-right: 1.25em;"><span class="about-icon"></span></a>
                {% endif %}
                {% include '_theme_toggle.html' %}
                <button class="icon-btn" id="fullscreen-btn" onclick="toggleFullscreen()"
                        title="Toggle full screen" aria-label="Toggle full screen"
                        style="margin-left: 1.25em;"><span class="fullscreen-icon"></span></button>
                <button class="icon-btn" id="change-font-btn" onclick="toggleFont()"
                        title="Change font" aria-label="Change font"
                        style="margin-left: 1.25em; margin-right: 1.25em;"><span class="change-font-icon"></span></button>
              </span>
              <button class="icon-btn" id="toggle-btn" onclick="toggleButtons()"
                      title="Toggle buttons" aria-label="Toggle buttons"><span class="expand-icon"></span></button>
            </div>
            <div class="stars">{% if show_stars and stars > 0 %}{{ '★' * stars }}{{ '☆' * (5 - stars) }}{% endif %}</div>
            <div class="date">{{ date1 }}</div>
        </div>
    </div>
    <script>
        function toggleTheme() {
            var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('jotquote-theme', next);
        }

        function toggleFont() {
            var next = document.documentElement.getAttribute('data-font') === 'libre-baskerville'
                ? 'inter' : 'libre-baskerville';
            document.documentElement.setAttribute('data-font', next);
            localStorage.setItem('jotquote-font', next);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function copyPermalink(path) {
            navigator.clipboard.writeText(window.location.origin + path);
            var btn = document.getElementById('permalink-btn');
            btn.classList.add('icon-btn-outline');
            setTimeout(function() {
                btn.classList.remove('icon-btn-outline');
            }, 2000);
        }

        function toggleButtons() {
            var container = document.getElementById('expandable-btns');
            var toggleBtn = document.getElementById('toggle-btn');
            var expanding = !container.classList.contains('expanded');
            if (expanding) {
                // Temporarily lift the max-width cap (with transitions disabled)
                // to measure the buttons' natural width. Without this, default
                // flex-shrink would collapse the buttons to 0 inside the capped
                // container, and scrollWidth would read as 0.
                container.style.transition = 'none';
                container.style.maxWidth = 'none';
                var naturalWidth = container.scrollWidth;
                container.style.maxWidth = '0';
                container.offsetHeight;
                container.style.transition = '';
                container.classList.add('expanded');
                container.style.maxWidth = naturalWidth + 'px';
            } else {
                container.classList.remove('expanded');
                container.style.maxWidth = '0';
            }
            toggleBtn.querySelector('span').className = expanding ? 'collapse-icon' : 'expand-icon';
        }

        // Schedule the next quote refresh at the server-provided expires_at instant.
        // Instead of a full-page reload, fetch /api and update the DOM in place.
        // On AJAX failure (network or 5xx), retry in 60s and keep the stale quote.
        async function scheduleAutoRefresh(expiresAt) {
            // First call uses the value Jinja embedded; subsequent calls pass in
            // the value from the most recent /api response.
            if (expiresAt === undefined) {
                expiresAt = {{ expires_at | tojson }};
            }
            if (!expiresAt) return;

            const reloadTime = new Date(expiresAt).getTime();
            const delay = Math.max(reloadTime - Date.now(), 0);
            console.log('The page will refresh automatically on ' + new Date(reloadTime).toLocaleString() + '.');

            setTimeout(async () => {
                try {
                    const resp = await fetch('/api', {cache: 'no-store'});
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const body = await resp.json();
                    applyQuoteUpdate(body);
                    scheduleAutoRefresh(body.expires_at);
                } catch (err) {
                    console.warn('Quote refresh failed, retrying in 60s:', err);
                    setTimeout(scheduleAutoRefresh, 60000);
                }
            }, delay);
        }

        // Apply quote DOM updates inside a same-document view transition so the
        // cross-fade animation defined in CSS still plays.  Falls back to a plain
        // update on browsers without document.startViewTransition (e.g. Firefox).
        function applyQuoteUpdate(body) {
            const update = () => {
                document.querySelector('.quote').textContent = body.quote;
                document.querySelector('.author').textContent = body.author;
                document.querySelector('.date').textContent = body.date_formatted;

                const pub = document.getElementById('publication');
                pub.textContent = body.publication || '';
                pub.hidden = !body.publication;

                const permalinkBtn = document.getElementById('permalink-btn');
                if (permalinkBtn) {
                    permalinkBtn.dataset.permalink = '/' + body.date;
                }
            };
            // Skip the view transition when the tab is hidden — the browser
            // aborts it with InvalidStateError, which would surface as an
            // unhandled promise rejection.  Also defensively swallow benign
            // rejections (e.g. transition canceled mid-animation).
            if (document.startViewTransition && !document.hidden) {
                const t = document.startViewTransition(update);
                t.finished.catch(() => {});
            } else {
                update();
            }
        }

        scheduleAutoRefresh();
    </script>
</body>
</html>
